# cloudbuild.yaml  (place at repo root)
steps:
  # Step 1: Build the Docker image from travel-engine/
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - -t
      - europe-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/promptwars-pranav:$COMMIT_SHA
      - ./travel-engine   # ← points to subfolder with your Dockerfile

  # Step 2: Push the image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - push
      - europe-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/promptwars-pranav:$COMMIT_SHA

  # Step 3: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - promptwars-pranav
      - --image=europe-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/promptwars-pranav:$COMMIT_SHA
      - --region=europe-west1
      - --platform=managed

images:
  - europe-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/promptwars-pranav:$COMMIT_SHA
